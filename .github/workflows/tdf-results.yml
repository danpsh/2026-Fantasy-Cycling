name: Scrape TdF results

# Builds tdf-results.xlsx from ProCyclingStats.
# - SCHEDULED evening runs in July auto-publish straight to main (no review) so
#   standings update even when no one is around.
# - MANUAL "Run workflow" runs open a PR instead (for testing, e.g. year=2025 +
#   out=tdf-results-2025-test.xlsx to validate against last year).
#
# PCS is behind Cloudflare and blocks datacenter IPs, so requests are routed
# through ScraperAPI's residential pool. Add a repo secret named SCRAPER_API_KEY
# (Settings -> Secrets and variables -> Actions). Free tier (~1,000 req/mo) is
# plenty: a full 21-stage scrape is ~21 requests.

on:
  schedule:
    - cron: "*/15 15-17 * 7 *"   # every 15 min, 15:00-17:45 UTC = 10:00am-12:45pm CDT (July);
                                 # idempotent — the first run to catch results commits, rest are no-ops
  workflow_dispatch:
    inputs:
      year:
        description: "Race year"
        default: "2026"
        required: true
      out:
        description: "Output file"
        default: "tdf-results.xlsx"
        required: true
      stage:
        description: "Stage(s): blank=today, e.g. 1,2 or all"
        default: ""
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install procyclingstats openpyxl curl_cffi

      - name: Scrape results
        env:
          YEAR: ${{ github.event.inputs.year || '2026' }}
          OUT: ${{ github.event.inputs.out || 'tdf-results.xlsx' }}
          STAGE: ${{ github.event.inputs.stage }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python scripts/scrape_tdf.py

      - name: Publish results (scheduled — auto-commit to main)
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tdf-results.xlsx
          if git diff --staged --quiet; then
            echo "No new results to publish."
          else
            git commit -m "Auto-publish TdF results $(date -u +%F)"
            git push
          fi

      - name: Open pull request (manual runs — review before publish)
        if: github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update TdF results (${{ github.event.inputs.out || 'tdf-results.xlsx' }})"
          title: "TdF results update"
          body: |
            Automated scrape from ProCyclingStats.
            Review the rider names/points, then merge to publish to the standings.
          branch: tdf-results-update
          add-paths: |
            ${{ github.event.inputs.out || 'tdf-results.xlsx' }}
